<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Panic</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="cabinet">
      <header class="marquee">
        <div>
          <p class="eyebrow">8-BIT ARCADE</p>
          <h1>PIXEL PANIC</h1>
        </div>
        <p class="tagline">Survive the glitch swarm.</p>
      </header>

      <canvas
        id="game"
        width="320"
        height="240"
        aria-label="Pixel Panic game screen"
      ></canvas>

      <section class="hud" aria-label="Game instructions">
        <p><strong>Move:</strong> Arrow keys or WASD</p>
        <p><strong>Start / Restart:</strong> Enter or Space</p>
        <p><strong>Goal:</strong> dodge the swarm and stay alive</p>
      </section>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
