name: Publish NPM Package

on:
  workflow_dispatch:
    inputs:
      publish_auth_mode:
        description: Publish auth mode to use for this run
        required: false
        default: oidc
        type: choice
        options:
          - oidc
          - token
  push:
    tags:
      - "v*"

env:
  PUBLISH_AUTH_MODE: ${{ github.event.inputs.publish_auth_mode || vars.NPM_PUBLISH_AUTH_MODE || 'oidc' }}

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: |
          npm install --global npm@^11.5.1
          npm --version

      - name: Run tests
        run: npm test

      - name: Validate version consistency
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md 2>/dev/null; then
            echo "::error::Version $VERSION not found in CHANGELOG.md"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version $VERSION"
            exit 1
          fi

      - name: Publish package
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          case "$PUBLISH_AUTH_MODE" in
            token)
              if [ -z "$NPM_TOKEN" ]; then
                echo "::error::PUBLISH_AUTH_MODE=token but NPM_TOKEN is not configured."
                exit 1
              fi
              echo "Publishing with NPM_TOKEN fallback."
              echo "NPM_TOKEN must be a granular write token with bypass 2FA enabled."
              NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish --access public --provenance
              ;;
            oidc)
              echo "Publishing with npm trusted publishing via OIDC."
              echo "Ensure npm package settings trust GitHub repo mizyoel/mercury-mesh and workflow publish.yml."
              npm publish --access public
              ;;
            *)
              echo "::error::Unsupported PUBLISH_AUTH_MODE: $PUBLISH_AUTH_MODE. Use oidc or token."
              exit 1
              ;;
          esac

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Published @mizyoel/mercury-mesh@$VERSION to npm." \
            --latest