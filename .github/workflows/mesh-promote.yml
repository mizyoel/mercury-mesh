name: Mercury Mesh Promote

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would happen without pushing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  dev-to-preview:
    name: Promote dev → preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state (dry run info)
        run: |
          echo "=== dev HEAD ===" && git log origin/dev -1 --oneline
          echo "=== preview HEAD ===" && git log origin/preview -1 --oneline
          echo "=== Files that would be stripped ==="
          STRIPPED=$( {
            git diff origin/preview..origin/dev --name-only | grep -E "^(\.(ai-team|ai-team-templates)/|team-docs/|docs/proposals/)" || true
            git diff origin/preview..origin/dev --name-only .mesh | grep -Ev '^\.mesh/(manifesto\.md|nervous-system/|templates/)' || true
          } | sort -u )
          if [ -n "$STRIPPED" ]; then
            printf '%s\n' "$STRIPPED"
          else
            echo "(none)"
          fi

      - name: Merge dev → preview (strip forbidden paths)
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git checkout preview
          git merge origin/dev --no-commit --no-ff -X theirs || true

          # Strip forbidden paths from merge commit but preserve packaged .mesh assets.
          git rm -rf --cached --ignore-unmatch \
            .ai-team/ \
            .ai-team-templates/ \
            team-docs/ \
            "docs/proposals/" || true

          FORBIDDEN_MESH=$(git ls-files .mesh | grep -Ev '^\.mesh/(manifesto\.md|nervous-system/|templates/)' || true)
          if [ -n "$FORBIDDEN_MESH" ]; then
            while IFS= read -r mesh_path; do
              [ -n "$mesh_path" ] || continue
              git rm -rf --cached --ignore-unmatch "$mesh_path"
            done <<EOF
$FORBIDDEN_MESH
EOF
          fi

          # Commit if there are staged changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: promote dev → preview (v$(node -e "console.log(require('./package.json').version)"))"
            git push origin preview
            echo "✅ Pushed preview branch"
          else
            echo "ℹ️ Nothing to commit — preview is already up to date"
          fi

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."

  preview-to-main:
    name: Promote preview → main (release)
    needs: dev-to-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state
        run: |
          echo "=== preview HEAD ===" && git log origin/preview -1 --oneline
          echo "=== main HEAD ===" && git log origin/main -1 --oneline
          echo "=== Version ===" && node -e "console.log('v' + require('./package.json').version)"

      - name: Validate preview is release-ready
        run: |
          git checkout preview
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md 2>/dev/null; then
            echo "::error::Version $VERSION not found in CHANGELOG.md — update before releasing"
            exit 1
          fi
          echo "✅ Version $VERSION has CHANGELOG entry"

          # Verify preview only contains publishable .mesh assets plus normal package sources.
          FORBIDDEN=$(git ls-files | grep -E "^(\.(ai-team|ai-team-templates)/|team-docs/|docs/proposals/)" || true)
          FORBIDDEN_MESH=$(git ls-files .mesh | grep -Ev '^\.mesh/(manifesto\.md|nervous-system/|templates/)' || true)
          if [ -n "$FORBIDDEN" ] || [ -n "$FORBIDDEN_MESH" ]; then
            echo "::error::Forbidden files found on preview:"
            [ -z "$FORBIDDEN" ] || printf '%s\n' "$FORBIDDEN"
            [ -z "$FORBIDDEN_MESH" ] || printf '%s\n' "$FORBIDDEN_MESH"
            exit 1
          fi
          echo "✅ Preview only tracks publishable .mesh assets and no forbidden paths"

      - name: Merge preview → main
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git checkout main
          git merge origin/preview --no-ff -m "chore: promote preview → main (v$(node -e "console.log(require('./package.json').version)"))"
          git push origin main
          echo "✅ Pushed main — mesh-release.yml will tag and publish the release"

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."
